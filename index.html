<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Portfólio - Allan Douglas</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
    }

    .container {
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      width: 300px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    a {
      text-decoration: none;
      color: white;
      display: block;
    }

    .btn {
      margin-top: 10px;
      background: #3b82f6;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>Portfólio</h1>
  <p>Allan Douglas Carneiro Patricio</p>

  <div class="container">

    <div class="card">
      <h3>SaaS Gestão IPDA</h3>
      <p>Sistema completo com autenticação e dashboard</p>
      <a href="https://gestao-ipda-caxias.vercel.app" target="_blank" class="btn">Ver Projeto</a>
    </div>

    <div class="card">
      <h3>Loja Online</h3>
      <p>Simulação de carrinho de compras</p>
      <a href="https://allan-carneiro.github.io/simulador-loja-online/" target="_blank" class="btn">Ver Projeto</a>
    </div>

    <div class="card">
      <h3>Cadastro de Alunos</h3>
      <p>Sistema de cadastro com CRUD</p>
      <a href="https://allan-carneiro.github.io/sistema-cadastro-alunos/" target="_blank" class="btn">Ver Projeto</a>
    </div>

  </div>

</body>
</html>
